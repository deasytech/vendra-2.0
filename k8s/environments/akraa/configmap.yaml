apiVersion: v1
kind: ConfigMap
metadata:
  name: lite-akraa-config
  namespace: akraa
data:
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_DATABASE: "lite_akraa"
  CACHE_DRIVER: "redis"
  SESSION_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "error"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://lite.akraa.io"
  SESSION_SECURE_COOKIE: "true"
  ASSET_URL: "https://lite.akraa.io"
